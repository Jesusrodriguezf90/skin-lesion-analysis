name: CI — Skin Lesion Analysis

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:

  tests:
    name: Tests unitarios
    runs-on: ubuntu-latest
    # Forzar Node.js 24 para evitar el warning de deprecación de Node.js 20
    # GitHub Actions eliminará Node.js 20 el 16 de septiembre de 2026
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          # CPU-only torch — los tests no necesitan GPU y la build completa pesa ~2GB
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          # opencv-python-headless en lugar de opencv-python — CI no tiene display gráfico
          pip install opencv-python-headless
          # Instalar el resto de dependencias desde requirements.txt
          # excluyendo torch, torchvision y opencv ya instalados arriba
          grep -v -E "^(torch|torchvision|opencv-python)" requirements.txt | pip install -r /dev/stdin

      - name: Ejecutar tests unitarios
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pytest tests/ -v --tb=short